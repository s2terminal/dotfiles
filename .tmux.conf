# screenと同様にCtrl-aをプレフィックスにする
set -g prefix C-a
unbind C-b

# ウィンドウ分割キー変更
bind - split-window -v
bind | split-window -h

# コピーモードのキーバインドをvi風に
set-window-option -g mode-keys vi

# マウス操作を有効化
set -g mouse on

# マウスドラッグ終了時にコピーモードを抜けずに選択状態を維持する
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# 選択範囲のハイライト色を明示指定（右端カーソル位置が見えづらい対策）
set -g mode-style "bg=blue,fg=white"

# 256色モードを有効化
set -g default-terminal "screen-256color"

# 同期モードをCtrl-a eでトグル
bind e setw synchronize-panes \; display "同期モード: #{?pane_synchronized,ON,OFF}"

# ウィンドウ名にカレントディレクトリ名を自動表示
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"